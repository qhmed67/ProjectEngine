<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace | ProjectEngine</title>
    <meta name="description" content="Project workspace, tracking and collaboration map.">
    <link rel="stylesheet" href="style.css">
    <style>
        .pulse-indicator {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: var(--warning);
            box-shadow: 0 0 10px var(--warning);
            animation: pulse-warn 1.5s infinite;
            display: inline-block;
            margin-left: 0.5rem;
        }
        @keyframes pulse-warn {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Project<span>Engine</span><div class="logo-dot"></div></div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-item">Home</a></li>
            <li><a href="developers.html" class="nav-item">Developers</a></li>
            <li><a href="dashboard.html" class="nav-item">Dashboard</a></li>
            <li><a href="workspace.html" class="nav-item active">Workspace</a></li>
        </ul>
        <div class="nav-actions">
            <a href="dashboard.html" class="btn btn-outline btn-sm">Leave Workspace</a>
        </div>
    </nav>

    <main class="main-content container mt-8">
        <div class="card mb-8">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2>Project: <span class="gradient-text" id="ws-project-title-unique">Fetching...</span></h2>
                    <p class="text-secondary" style="font-size:1.1rem;" id="ws-partner-text">Real-time collaboration workspace.</p>
                </div>
                <div class="level-badge badge-junior" style="font-size: 0.9rem;" id="ws-project-level">Loading...</div>
            </div>
            
            <div class="progress-container">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span style="font-weight: 600;">Overall Sprint Completion</span>
                    <span style="font-weight: 800; color: var(--accent);" id="ws-progress-text">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="ws-progress-bar" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <div class="kanban-board">
            <div class="kanban-column">
                <div class="column-header">
                    <h3>To Do / Backlog</h3>
                    <span class="task-count" id="count-todo">0</span>
                </div>
                <div id="add-task-container" style="text-align: center; margin-bottom: 1rem; display: none;">
                    <button class="btn btn-outline btn-sm" onclick="addTask()" style="width: 100%; border-style: dashed;">+ Add Task</button>
                </div>
                <div id="tasks-todo"></div>
            </div>
            
            <div class="kanban-column">
                <div class="column-header">
                    <h3 style="display:flex; align-items:center;">In Progress <div class="pulse-indicator"></div></h3>
                    <span class="task-count" id="count-inprogress">0</span>
                </div>
                <div id="tasks-inprogress"></div>
            </div>
            
            <div class="kanban-column">
                <div class="column-header">
                    <h3>Done</h3>
                    <span class="task-count" id="count-done">0</span>
                </div>
                <div id="tasks-done"></div>
            </div>
        </div>

        <button id="chat-toggle-btn" class="chat-toggle-btn">💬</button>
        <div class="chat-widget" id="chat-widget">
            <div class="chat-header">
                <div class="dev-avatar" id="chat-avatar" style="width: 40px; height: 40px; font-size: 1rem; border: none; box-shadow: none;">PR</div>
                <div style="flex: 1;">
                    <h4 style="margin:0; font-size:1rem;" id="ws-chat-name">Partner</h4>
                    <span style="font-size:0.75rem; color:var(--success);">● Online</span>
                </div>
                <button id="chat-close-btn" style="background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text-secondary);">&times;</button>
            </div>
            <div class="chat-messages" id="chat-messages-container">
                <div style="text-align:center; color: var(--text-secondary); margin-top: 2rem;">Loading messages...</div>
            </div>
            <div class="chat-input" style="padding: 1rem; background: rgba(255, 255, 255, 0.9); display: flex; align-items: center;">
                <input id="ws-chat-input" type="text" placeholder="Type your message..." style="border: 1px solid var(--border-color); padding: 0.75rem; border-radius: 20px; outline: none; flex: 1; background: rgba(0, 0, 0, 0.03); color: var(--text-primary);">
                <button id="ws-chat-send" class="btn btn-primary" style="padding: 0.5rem 1rem; border-radius:20px; margin-left:10px; flex-shrink: 0;">Send</button>
            </div>
        </div>
    </main>
    <script src="script.js?v=2.0"></script>
</body>
</html>
