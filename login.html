<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ProjectEngine</title>
    <meta name="description" content="Sign in to your ProjectEngine account.">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--nav-height));
            padding: 2rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Project<span>Engine</span><div class="logo-dot"></div></div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-item">Home</a></li>
            <li><a href="developers.html" class="nav-item">Developers</a></li>
            <li><a href="dashboard.html" class="nav-item">Dashboard</a></li>
            <li><a href="workspace.html" class="nav-item">Workspace</a></li>
        </ul>
        <div class="nav-actions">
            <a href="login.html" class="btn btn-outline btn-sm">Sign In</a>
            <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
    </nav>

    <main class="main-content login-container">
        <div class="form-container card" style="width: 100%;">
            <h2 class="text-center mb-4">Welcome <span class="gradient-text">Back</span></h2>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="form-group mt-8">
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </div>
                <div class="text-center mt-4">
                    <p class="text-secondary">Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Sign up here</a></p>
                </div>
            </form>
        </div>
    </main>
    <script src="script.js?v=1.1"></script>
</body>
</html>
